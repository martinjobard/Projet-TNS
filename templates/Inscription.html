{% extends "base.html" %}

{% block content %}
    <h2>Inscription d'un nouvel intervenant</h2>

    {% if erreur %}
        <div style="color: red; border: 1px solid red; padding: 10px;">
            <p>{{ erreur }}</p>
        </div>
    {% endif %}
    
    <form action="{{ url_for('Inscription') }}" method="POST">
        
        <fieldset>
            <legend>Informations de Connexion</legend>
            
            <label for="username">Nom d'utilisateur :</label>
            <input type="text" id="username" name="nom_utilisateur" required>

            <label for="email">Email :</label>
            <input type="email" id="email" name="email" required>

            <label for="password">Mot de passe :</label>
            <input type="password" id="password" name="mot_de_passe" required>

            <label for="confirm_password">Confirmer le mot de passe :</label>
            <input type="password" id="confirm_password" name="confirmation_mdp" required>
        </fieldset>

        <fieldset>
            <legend>Informations Personnelles</legend>
            
            <label for="prenom">Prénom :</label>
            <input type="text" id="prenom" name="prenom" required>

            <label for="nom">Nom :</label>
            <input type="text" id="nom" name="nom" required>
        </fieldset>

        <fieldset>
            <legend>Compétence Principale</legend>
            
            <label for="competence">Compétence :</label>
            <input type="text" id="competence" name="competence" required>

            <label for="niveau">Niveau (ex: Expert, Intermédiaire) :</label>
            <input type="text" id="niveau" name="niveau" required>
        </fieldset>

        <button type="submit">Créer le compte</button>
    </form>
{% endblock %}
