{% extends 'base.html' %}
{% block content %}

<h1>
    Veuillez chercher le nom de l'intervenant qui vous intéresse pour accéder à son profil:
</h1>

<form id="searchForm" action="/recherche" method="get">
    <input type="text" name="nom" placeholder="Nom" required>
    <input type="text" name="prenom" placeholder="Prénom" required>
    <button type="submit">Rechercher</button>
</form>

<h2>
    Tous nos intervenants:
</h2>
{% for int in intervenants %}
<li> <a href= "/Intervenants/{{int.lien}}" > {{int.nom}} {{int.prenom}} </a>
 </li>

{% endfor %}



{% endblock %}
