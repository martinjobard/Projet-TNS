{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        
        <div style="background-color: #ffffff; border: 1px solid #ddd; border-radius: 8px; padding: 30px; margin-top: 30px; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">
            
            <h2 style="margin-top: 0; padding-bottom: 15px; border-bottom: 2px solid #007bff; color: #333; margin-bottom: 25px;">
                <i class="fas fa-user-plus"></i> Nouveau Client
            </h2>

            <form action="{{ url_for('ajouter_client') }}" method="POST">
                
                <h5 class="text-muted mb-3">Informations Générales</h5>
                <div class="row mb-3">
                    <div class="col-md-6">
                        <label class="form-label fw-bold">Nom *</label>
                        <input type="text" name="nom" class="form-control" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-bold">Prénom *</label>
                        <input type="text" name="prenom" class="form-control" required>
                    </div>
                </div>

                <div class="row mb-3">
                    <div class="col-md-6">
                        <label class="form-label fw-bold">Entreprise *</label>
                        <input type="text" name="entreprise" class="form-control" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Secteur d'activité</label>
                        <select name="secteur" class="form-select">
                            <option value="IT">IT / Numérique</option>
                            <option value="Finance">Finance</option>
                            <option value="Industrie">Industrie</option>
                            <option value="Services">Services</option>
                            <option value="Autre">Autre</option>
                        </select>
                    </div>
                </div>

                <hr class="my-4">

                <h5 class="text-muted mb-3">Coordonnées & Localisation</h5>
                
                <div class="mb-3">
                    <label class="form-label fw-bold">Adresse Complète (Pour la carte) *</label>
                    <input type="text" name="adresse" class="form-control" placeholder="Ex: 10 Rue de Rivoli, 75001 Paris" required>
                    <small class="text-muted">Soyez précis pour que le client apparaisse correctement sur la carte.</small>
                </div>

                <div class="row mb-4">
                    <div class="col-md-6">
                        <label class="form-label">Email</label>
                        <input type="email" name="email" class="form-control">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Téléphone</label>
                        <input type="text" name="telephone" class="form-control">
                    </div>
                </div>

                <div class="d-flex gap-2 justify-content-end">
                    <a href="{{ url_for('Clients') }}" class="btn btn-secondary">Annuler</a>
                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-save"></i> Enregistrer le client
                    </button>
                </div>

            </form>
        </div>
    </div>
</div>
{% endblock %}
