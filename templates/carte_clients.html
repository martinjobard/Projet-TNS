{% extends 'base.html' %}

{% block content %}

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    
    <style>
        /* Style de la carte */
        #map { 
            height: 600px; 
            width: 100%; 
            border-radius: 8px; 
            border: 1px solid #ddd; /* Bordure fine grise */
            margin-top: 20px;
            margin-bottom: 20px;
            z-index: 1; /* S'assure que la carte reste en dessous des menus déroulants */
        }
    </style>

    <div style="background-color: #ffffff; border: 1px solid #ddd; border-radius: 8px; padding: 25px; margin-top: 30px; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">
        
        <h2 style="margin-top: 0; padding-bottom: 15px; border-bottom: 2px solid #007bff; color: #333;">
            <i class="fas fa-map-marked-alt"></i> Carte des Clients
        </h2>
        
        <p class="text-muted">Visualisez la localisation géographique de tous vos clients.</p>
        
        <div id="map" data-clients='{{ clients | tojson }}'></div>
        
        <div style="margin-top: 15px;">
            <a href="{{ url_for('Clients') }}" class="btn btn-secondary">
                <i class="fas fa-arrow-left"></i> Retour à la liste
            </a>
        </div>

    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            
            // A. Initialisation de la carte (Centrée sur la France)
            var map = L.map('map').setView([46.603354, 1.888334], 6);

            // B. Fond de carte (OpenStreetMap)
            L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
                maxZoom: 19,
                attribution: '&copy; <a href="http://www.openstreetmap.org/copyright">OpenStreetMap</a>'
            }).addTo(map);

            // C. Récupération des données clients depuis le HTML
            var mapElement = document.getElementById('map');
            var clientsData = JSON.parse(mapElement.dataset.clients);

            // D. Placement des marqueurs
            clientsData.forEach(function(client) {
                // On vérifie que les coordonnées existent bien
                if (client.lat && client.lon) {
                    var marker = L.marker([client.lat, client.lon]).addTo(map);
                    
                    // Contenu de la bulle d'info
                    var popupContent = `
                        <div style="text-align:center; min-width: 150px;">
                            <strong style="color: #007bff; font-size: 1.1em;">${client.entreprise}</strong><br>
                            <span style="font-weight: bold;">${client.nom}</span><br>
                            <hr style="margin: 5px 0;">
                            <i style="font-size:0.85em; color:gray;">${client.adresse || ''}</i>
                        </div>
                    `;
                    
                    marker.bindPopup(popupContent);
                }
            });
        });
    </script>

{% endblock %}
