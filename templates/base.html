<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Site Interne TNS</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

    <input type="checkbox" id="toggle-sidebar">

    <header>
        <div class="header-left">
            <label for="toggle-sidebar" class="hamburger-btn">
                <span></span>
                <span></span>
                <span></span>
            </label>
            
            <div class="logo-container">
                <img src="{{ url_for('static', filename='images/logo.png') }}" class="logo" alt="Logo TNS">
            </div>
        </div>

        <div class="search-box">
            <form action="/recherche" method="GET">
                <input type="text" placeholder="Rechercher un client, un projet...">
                <button type="submit">🔍</button>
            </form>
        </div>

        <div class="header-right">
            <a href="/Connexion" class="btn-connexion">Connexion</a>
            <div class="profile-container">
                <img src="{{ url_for('static', filename='images/default-avatar.png') }}" 
                    class="avatar" 
                    onclick="toggleProfileMenu()" 
                    alt="Profil">
                <div class="profile-dropdown" id="monProfilDropdown">
                    <a href="/Mon_compte">Mon compte</a>
                    </div>
            </div>
        </div>
    </header>

    <aside class="sidebar">
        <nav>
            <ul>
                <li><a href="/">Accueil</a></li>

                <li>
                    <a href="#" class="sidebar-title" onclick="toggleSidebarItem(this)">Gestion ▾</a>
                    <ul class="sidebar-submenu">
                        <li><a href="/Clients">Clients</a></li>
                        <li><a href="/Intervenants">Intervenants</a></li>
                        <li><a href="/Projets">Projets</a></li>
                        <li><a href="/Partenaires">Partenaires</a></li>
                    </ul>
                </li>

                <li><a href="/Missions_réalisées">Missions</a></li>

                <li>
                    <a href="#" class="sidebar-title" onclick="toggleSidebarItem(this)">Outils ▾</a>
                    <ul class="sidebar-submenu">
                        <li><a href="/Stats">Stats</a></li>
                        <li><a href="/Import-Export">Import-Export</a></li>
                        <li><a href="/Wiki-Docs">Wiki-Docs</a></li>
                        <li><a href="/tinder_like">Tinder Like</a></li>
                    </ul>
                </li>
            </ul>
        </nav>
    </aside>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer>
        <p>Copyright 2025 - Site Interne TNS</p>
    </footer>

    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
